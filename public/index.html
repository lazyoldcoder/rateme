
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<title>Rate Me</title>
<!-- script type="module" src="/js/main.js"></script -->
<!-- JS files /js  main.js  businessUI.js  ratingsUI.js   user.js  geo.js -->
</head>

<body>
<div id="apptitleWrapper">
  <span class="small-label">VER 0.01</span>
  <h1 class="app-title">😡 RateMe 😄</h1>
  <span class="tiny-label" >19-03-26</span>
</div>

<!-- Business Selector pop up sheet -->
<div id="businessSelector">
  <div id="selectedBusiness">
    <div class="biz-name">☕ Johns Coffee</div>
    <div class="biz-location">Queen Street</div>
  </div>
  <div class="biz-arrow">⌄⌄</div>
</div>

<!-- Favorites - Horizontal scrolling Business Cards -->
<label for="businessContainer">Favourites:</label>
<div id="businessContainer"></div>

<!-- Rating Form -->
<div id="loginContainer">

  <div id="usernameWrapper">
    <div class="input-prefix">User:</div>
    <input type="text" id="usernameInput" placeholder="Username">
  </div>

  <div id="buttonsWrapper">
    <button id="reRegisterBtn">Register</button>
    <button id="loginBtn">&nbsp;&nbsp;Login&nbsp;&nbsp;</button>
  </div>

</div>


<form id="ratingForm">

  <label>Rating</label>

    <div id="starRating" class="emoji-rating">
        <button type="button" class="emoji-btn" data-value="1" aria-label="Very bad">😡</button>
        <button type="button" class="emoji-btn" data-value="2" aria-label="Bad">😞</button>
        <button type="button" class="emoji-btn" data-value="3" aria-label="Neutral">😐</button>
        <button type="button" class="emoji-btn" data-value="4" aria-label="Good">🙂</button>
        <button type="button" class="emoji-btn" data-value="5" aria-label="Excellent">😄</button>
    </div>
        
    <!-- Star display (driven by emoji selection) -->
    <div id="starDisplay">
      <span class="star" data-value="1">★</span>
      <span class="star" data-value="2">★</span>
      <span class="star" data-value="3">★</span>
      <span class="star" data-value="4">★</span>
      <span class="star" data-value="5">★</span>
    </div>
     
    <div class="comment-header">
      <label for="comment">Comment</label>
      <button id="submitBtn">Submit</button>
    </div>


    <div class="comment-wrapper">
      <textarea id="comment" rows="3"></textarea>
    </div>

</form>

<!-- All Ratings List -->
<div id="ratingsContainer">
  <h2 class="ratings-title">All Ratings</h2>
  <div id="ratingsList"></div>
</div>


<!-- Select Business Bottom Sheet -->
<div id="businessSheet">

  <div class="sheet-handle">
  </div>

  <!-- Flex row for label + button -->
  <div id="sheetHeaderRow">
    <h2>Select Business</h2>
    <button id="addnewBtn">Add New</button>
    <button id="nearMeBtn">📍 Near Me</button>
  </div>

  <input type="text" id="businessSearch" placeholder="Search businesses...">

  <!-- <div id="gpsDisplay" style="margin-bottom: 0.5rem; font-size: 0.85rem; color: #333;"> -->
  
  <div id="gpsDisplay">
    Current location: unknown
  </div>

  <div id="businessList">
  </div>

</div>



<!-- Add New Business Bottom Sheet -->
<div id="addnewBusinessSheet" class="sheet">
  <div class="sheet-handle">
  </div>

  <h2>Add New Business</h2>
<!--   
  <form id="addNewBusinessForm">
    <input type="text" id="newBusinessName" placeholder="Business Name" required>
    <input type="text" id="newBusinessLocation" placeholder="Location">
    <input type="email" id="newBusinessEmail" placeholder="Email" required>
    <input type="text" id="newBusinessLat" placeholder="Latitude">
    <input type="text" id="newBusinessLng" placeholder="Longitude">
    <div style="margin-top: 1rem;">
      <button type="submit" id="addnewBtn">Save</button>
      <button type="button" id="canceladdnewBtn">Cancel</button>
    </div>
  </form> -->


  <form id="addNewBusinessForm">
    <label for="newBusinessName">Business Name <span style="color:red">*</span></label>
    <input type="text" id="newBusinessName" placeholder="Required" required>

    <label for="newBusinessLocation">Location</label>
    <input type="text" id="newBusinessLocation" placeholder="Optional">

    <label for="newBusinessEmail">Email <span style="color:red">*</span></label>
    <input type="email" id="newBusinessEmail" placeholder="Required" required>

    <hr>
    <label>GPS Coordinates - Optional</label>
      <div class="addnewgpsheader">
        <span>Manual or GPS </span>
        <button type="button" id="fillGPSBtn">📍 Use Current Location</button>
      </div>
      <label for="newBusinessLat">Latitude</label>
    <input type="text" id="newBusinessLat" placeholder="Optional, can use GPS">

    <label for="newBusinessLng">Longitude</label>
    <input type="text" id="newBusinessLng" placeholder="Optional, can use GPS">

    <div style="margin-top: 1rem;">
      <button type="submit" id="savenewbusinessBtn">Save</button>
      <button type="button" id="canceladdnewBtn">Cancel</button>
    </div>

  </form>



</div>
















<script src="script.js"></script>

</body>
</html>
