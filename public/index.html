function endDrag() {
  if (!isDragging) return;
  isDragging = false;

  // restore transition
  sheet.style.transition = 'bottom 0.3s ease';

  const current = parseFloat(sheet.style.bottom);
  const snapThreshold = window.innerHeight / 4;

  if (current > FULL_OPEN - snapThreshold) {
    sheet.style.bottom = `${FULL_OPEN}px`; // fully open
  } else if (current > HALF_OPEN - snapThreshold) {
    sheet.style.bottom = `${HALF_OPEN}px`; // half open
  } else {
    closeSheet(); // fully closed
  }
}

async function fetchRatings() {
  if (!currentBusiness) return;

  try {
    const res = await fetch(`/api/ratings?businessId=${encodeURIComponent(currentBusiness)}`);
    const ratings = await res.json();

    // Safety check: ensure we have an array
    if (!Array.isArray(ratings)) {
      console.error('Ratings fetch failed:', ratings);
      ratingsList.innerHTML = '<p>Error loading ratings.</p>';
      return;
    }

    ratingsList.innerHTML = '';

    if (!ratings.length) {
      ratingsList.innerHTML = '<p>No ratings yet for this business.</p>';
      return;
    }

    for (const r of ratings) {
      const div = document.createElement('div');
      div.className = 'rating-card';

      const starsDisplay = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);

      div.innerHTML = `
        <div class="stars-display">${starsDisplay}</div>
        <div><strong>${r.username}</strong></div>
        <div>${r.comment || '<em>No comment</em>'}</div>
        <div class="timestamp">${new Date(r.timestamp).toLocaleString()}</div>
      `;

      ratingsList.appendChild(div);
    }

  } catch (err) {
    console.error(err);
    ratingsList.innerHTML = '<p>Error loading ratings.</p>';
  }
}

function getCurrentLocationAndSort() {
  if (!navigator.geolocation) {
    alert("Geolocation not supported by your browser");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude, longitude } = pos.coords;
      

      //new mar17
      userLat = latitude;
      userLng = longitude;


      // Display coords for debugging
      gpsDisplay.textContent = `Current location: ${latitude.toFixed(6)}, ${longitude.toFixed(6)}`;

      // Sort businesses by distance
 
      const sorted = [...businesses].sort((a, b) => {
        const dA = getDistance(latitude, longitude, a.lat, a.lng);
        const dB = getDistance(latitude, longitude, b.lat, b.lng);
        return dA - dB;
      });

      renderBusinessList(sorted); // pass sorted array
    },
 
    (err) => {
      alert("Failed to get location: " + err.message);
    },
    { enableHighAccuracy: true }
  );
}





// Haversine formula
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3; // meters
  const φ1 = lat1 * Math.PI / 180;
  const φ2 = lat2 * Math.PI / 180;
  const Δφ = (lat2 - lat1) * Math.PI / 180;
  const Δλ = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(Δφ/2) * Math.sin(Δφ/2) +
    Math.cos(φ1) * Math.cos(φ2) *
    Math.sin(Δλ/2) * Math.sin(Δλ/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c; // distance in meters
}

let currentUser = null;

async function fetchUser(firstTimeName = null) {
  let url = "/api/users";
  if (!currentUser && firstTimeName) {
    url += `?username=${encodeURIComponent(firstTimeName)}`;
  }

  const res = await fetch(url);


  const user = await res.json();

  // Only set currentUser if we don't already have full details
  if (!currentUser || !currentUser.email) {
    currentUser = user;
  }

  return user;



}


async function init() {
  try {
    // Try to fetch user from cookie / KV
    let user = await fetchUser(); 

    // If user doesn't exist, prompt once
    if (!user.username) {
      const username = prompt("Enter your username:");
      const email = prompt("Enter your email:");
      const phone = prompt("Enter your phone number:");

      // First-time creation call
      user = await fetchUserCreation({ username, email, phone });
    }

    currentUser = user; // full user object
    console.log("Logged in as:", currentUser.username);

  } catch (err) {
    console.error("Login/init error:", err);
  }
}

// Helper to create a new user in KV
async function fetchUserCreation({ username, email, phone }) {
  const res = await fetch(`/api/users?username=${encodeURIComponent(username)}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, email, phone })
  });
  return await res.json();
}





// Call init on page load
init();

  currentUser = null;
  document.cookie = "rateme_user=; Path=/; Max-Age=0";

  // Prompt for new user info
  const username = prompt("Enter username:");
  const email = prompt("Enter email:");
  const phone = prompt("Enter phone:");

  // POST to KV
  const res = await fetch('/api/users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, email, phone })
  });

  currentUser = await res.json();
  console.log("Re-registered as:", currentUser);

  // Immediately refresh ratings with updated user info
  fetchRatings();
});
