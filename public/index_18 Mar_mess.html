/* Sheet positions */
const CLOSED = -window.innerHeight;     // fully hidden
const HALF_OPEN = -window.innerHeight / 2; // half screen
const FULL_OPEN = 0;                     // fully open

let startY = 0, sheetStartBottom = CLOSED, isDragging = false;

/* Initialize sheet fully closed */
sheet.style.bottom = `${CLOSED}px`;

/* Drag handlers */
function startDrag(e) {
  isDragging = true;
  startY = e.touches ? e.touches[0].clientY : e.clientY;
  sheetStartBottom = parseFloat(window.getComputedStyle(sheet).bottom);
  sheet.style.transition = 'none';
}

function dragMove(e) {
  if (!isDragging) return;

  const currentY = e.touches ? e.touches[0].clientY : e.clientY;
  const diff = startY - currentY; // positive if dragging up

  let newBottom = sheetStartBottom + diff;
  newBottom = Math.min(FULL_OPEN, Math.max(CLOSED, newBottom));
  sheet.style.bottom = `${newBottom}px`;

  if (Math.abs(diff) > 5) e.preventDefault(); // prevent page scroll
}

function endDrag() {
  if (!isDragging) return;
  isDragging = false;
  sheet.style.transition = 'bottom 0.3s ease';

  const current = parseFloat(sheet.style.bottom);
  const snapThreshold = window.innerHeight / 4;

  if (current > HALF_OPEN + snapThreshold) {
    openSheet(FULL_OPEN);
  } else if (current > CLOSED + snapThreshold) {
    openSheet(HALF_OPEN);
  } else {
    closeSheet();
  }
}

/* Open/close helpers */
function openSheet(position) {
  sheet.style.bottom = `${position}px`;
  document.body.classList.add('sheet-open');
}

function closeSheet() {
  sheet.style.bottom = `${CLOSED}px`;
  document.body.classList.remove('sheet-open');
}

/* Event listeners */
handle.addEventListener('mousedown', startDrag);
handle.addEventListener('touchstart', startDrag, { passive: false });

document.addEventListener('mousemove', dragMove);
document.addEventListener('touchmove', dragMove, { passive: false });

document.addEventListener('mouseup', endDrag);
document.addEventListener('touchend', endDrag);

/* Open sheet on business selector click */
selector.addEventListener('click', () => {
  openSheet(HALF_OPEN);
});

/* Close sheet if user taps outside */
sheet.addEventListener('click', (e) => {
  if (e.target === sheet) closeSheet();
});

async function fetchRatings() {
  if (!currentBusiness) return;

  try {
    const res = await fetch(`/api/ratings?businessId=${encodeURIComponent(currentBusiness)}`);
    const ratings = await res.json();

    // Safety check: ensure we have an array
    if (!Array.isArray(ratings)) {
      console.error('Ratings fetch failed:', ratings);
      ratingsList.innerHTML = '<p>Error loading ratings.</p>';
      return;
    }

    ratingsList.innerHTML = '';

    if (!ratings.length) {
      ratingsList.innerHTML = '<p>No ratings yet for this business.</p>';
      return;
    }

    for (const r of ratings) {
      const div = document.createElement('div');
      div.className = 'rating-card';

      const starsDisplay = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);

      div.innerHTML = `
        <div class="stars-display">${starsDisplay}</div>
        <div><strong>${r.username}</strong></div>
        <div>${r.comment || '<em>No comment</em>'}</div>
        <div class="timestamp">${new Date(r.timestamp).toLocaleString()}</div>
      `;

      ratingsList.appendChild(div);
    }

  } catch (err) {
    console.error(err);
    ratingsList.innerHTML = '<p>Error loading ratings.</p>';
  }
}

const gpsDisplay = document.getElementById("gpsDisplay");

function getCurrentLocationAndSort() {
  if (!navigator.geolocation) {
    alert("Geolocation not supported by your browser");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude, longitude } = pos.coords;
      

      //new mar17
      userLat = latitude;
      userLng = longitude;


      // Display coords for debugging
      gpsDisplay.textContent = `Current location: ${latitude.toFixed(6)}, ${longitude.toFixed(6)}`;

      // Sort businesses by distance
 
      const sorted = [...businesses].sort((a, b) => {
        const dA = getDistance(latitude, longitude, a.lat, a.lng);
        const dB = getDistance(latitude, longitude, b.lat, b.lng);
        return dA - dB;
      });

      renderBusinessList(sorted); // pass sorted array
    },
 
    (err) => {
      alert("Failed to get location: " + err.message);
    },
    { enableHighAccuracy: true }
  );
}





// Haversine formula
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3; // meters
  const φ1 = lat1 * Math.PI / 180;
  const φ2 = lat2 * Math.PI / 180;
  const Δφ = (lat2 - lat1) * Math.PI / 180;
  const Δλ = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(Δφ/2) * Math.sin(Δφ/2) +
    Math.cos(φ1) * Math.cos(φ2) *
    Math.sin(Δλ/2) * Math.sin(Δλ/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c; // distance in meters
}

}

      div.className = 'rating-card';
      const starsDisplay = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
      div.innerHTML = `<div class="stars-display">${starsDisplay}</div><div><strong>${r.username}</strong></div><div>${r.comment || '<em>No comment</em>'}</div><div class="timestamp">${new Date(r.timestamp).toLocaleString()}</div>`;
      ratingsList.appendChild(div);
    });
  } catch(err){ console.error(err); ratingsList.innerHTML='<p>Error loading ratings.</p>'; }
}

// -------------------- Emoji rating --------------------
emojiBtns.forEach(btn => {
  btn.addEventListener('click', e => {
    e.preventDefault();
    selectedRating = parseInt(btn.dataset.value);
    emojiBtns.forEach(b => b.classList.toggle('selected', b.dataset.value == selectedRating));
    stars.forEach(s => s.classList.toggle('selected', s.dataset.value <= selectedRating));
  });
});

// -------------------- Submit rating --------------------
form.addEventListener('submit', async e => {
  e.preventDefault();
  if (!currentUser) return alert('Please log in first');
  if (!currentBusiness) return alert('Please select a business');
  if (!selectedRating) return alert('Please select a rating');
  const comment = commentInput.value.trim();
  const timestamp = new Date().toISOString();
  try {
    await fetch(`/api/ratings?businessId=${encodeURIComponent(currentBusiness)}`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ rating:selectedRating, comment, username:currentUser.username, email:currentUser.email, phone:currentUser.phone, timestamp })
    });
    commentInput.value=''; selectedRating=0;
    emojiBtns.forEach(b=>b.classList.remove('selected'));
    stars.forEach(s=>s.classList.remove('selected'));
    fetchRatings();
  } catch(err){ console.error(err); alert('Failed to submit rating.'); }
});

// -------------------- User init --------------------
async function fetchUser(firstTimeName=null) {
  let url="/api/users";
  if (!currentUser && firstTimeName) url+=`?username=${encodeURIComponent(firstTimeName)}`;
  const res = await fetch(url);
  const user = await res.json();
  if (!currentUser || !currentUser.email) currentUser = user;
  return user;
}
async function fetchUserCreation({username,email,phone}) {
  const res = await fetch(`/api/users?username=${encodeURIComponent(username)}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,email,phone})});
  return await res.json();
}
async function initUser() {
  try {
    let user = await fetchUser();
    if (!user.username){
      const username=prompt("Enter username:");
      const email=prompt("Enter email:");
      const phone=prompt("Enter phone:");
      user = await fetchUserCreation({username,email,phone});
    }
    currentUser = user;
  } catch(err){ console.error(err); }
}

// -------------------- GPS --------------------
function getCurrentLocationAndSort() {
  if (!navigator.geolocation) return alert("Geolocation not supported");
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat = pos.coords.latitude; userLng = pos.coords.longitude;
    gpsDisplay.textContent = `Current location: ${userLat.toFixed(6)}, ${userLng.toFixed(6)}`;
    const sorted = [...businesses].sort((a,b)=> getDistance(userLat,userLng,a.lat,a.lng)-getDistance(userLat,userLng,b.lat,b.lng));
    renderBusinessList(sorted);
  }, err=>alert("Failed to get location: "+err.message), { enableHighAccuracy:true });
}
document.getElementById("nearMeBtn").addEventListener("click", getCurrentLocationAndSort);

// -------------------- Event listeners --------------------
sheet.addEventListener('touchmove', e => { if (!isDragging) return; e.stopPropagation(); }, { passive:false });
handle.addEventListener('mousedown', startDrag);
handle.addEventListener('touchstart', startDrag, {passive:false});
document.addEventListener('mousemove', dragMove);
document.addEventListener('touchmove', dragMove, {passive:false});
document.addEventListener('mouseup', endDrag);
document.addEventListener('touchend', endDrag);
selector.addEventListener('click', ()=>openSheet(HALF_OPEN));
businessSearchInput.addEventListener("input", ()=>renderBusinessList(businesses.filter(b=>b.name.toLowerCase().includes(businessSearchInput.value.toLowerCase().trim()))));

// -------------------- Init --------------------
async function initApp(){
  await loadBusinesses();
  await initUser();
}
initApp();




</script>
