
<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<title>Rate Me</title>
<!-- Load the main JS module -->
<!-- s cript type="module" src="/js/main.js"></scr ipt -->

<!-- JS files structure:
/js
   main.js
   businessUI.js
   ratingsUI.js
   user.js
   geoUtils.js
 -->

</head>

<body>
<div id="apptitleWrapper">
  <span class="small-label">VER 0.01</span>
  <h1 class="app-title">😡 RateMe 😄</h1>
  
  <span class="tiny-label" >19-03-26</span>
</div>
 

<!-- Business Selector pop up sheet -->
<div id="businessSelector">
  <div id="selectedBusiness">
    <div class="biz-name">☕ Johns Coffee</div>
    <div class="biz-location">Queen Street</div>
  </div>
  <div class="biz-arrow">⌄⌄</div>
</div>


<!-- Favorites - Horizontal scrolling Business Cards -->
<label for="businessContainer">Favourites:</label>
<div id="businessContainer"></div>


<!-- Rating Form -->

<div id="loginContainer">

<!-- 

  <div id="usernameWrapper">
    <label for="usernameInput">USER:</label>
    <input type="text" id="usernameInput" placeholder="Username">
  </div> -->

  <div id="usernameWrapper">
    <div class="input-prefix">User:</div>
    <input type="text" id="usernameInput" placeholder="Username">
  </div>





  <div id="buttonsWrapper">
    <button id="reRegisterBtn">Register</button>
    <button id="loginBtn">&nbsp;&nbsp;Login&nbsp;&nbsp;</button>
  </div>



</div>

<style>   

</style>



<form id="ratingForm">

  <label>Rating</label>

    <div id="starRating" class="emoji-rating">
        <button type="button" class="emoji-btn" data-value="1" aria-label="Very bad">😡</button>
        <button type="button" class="emoji-btn" data-value="2" aria-label="Bad">😞</button>
        <button type="button" class="emoji-btn" data-value="3" aria-label="Neutral">😐</button>
        <button type="button" class="emoji-btn" data-value="4" aria-label="Good">🙂</button>
        <button type="button" class="emoji-btn" data-value="5" aria-label="Excellent">😄</button>
    </div>

        
    <!-- Star display (driven by emoji selection) -->
    <div id="starDisplay">
      <span class="star" data-value="1">★</span>
      <span class="star" data-value="2">★</span>
      <span class="star" data-value="3">★</span>
      <span class="star" data-value="4">★</span>
      <span class="star" data-value="5">★</span>
    </div>
     
    <div class="comment-header">
      <label for="comment">Comment</label>
      <button id="submitBtn">Submit</button>
    </div>


    <div class="comment-wrapper">
      <textarea id="comment" rows="3"></textarea>
    </div>


</form>

<!-- All Ratings List -->
<div id="ratingsContainer">
  <h2 class="ratings-title">All Ratings</h2>
  <div id="ratingsList"></div>
</div>






<!-- Business Bottom Sheet -->
<div id="businessSheet">

  <div class="sheet-handle"></div>
  



  <!-- Flex row for label + button -->
  <div id="sheetHeaderRow">
    <h2>Select Business</h2>
    <button id="addNewBtn">Add New</button>
    <button id="nearMeBtn">📍 Near Me</button>
  </div>


  <!-- <h2>Select Business</h2> -->

  <input type="text" id="businessSearch" placeholder="Search businesses...">
  
  <!-- <button id="nearMeBtn">📍 Near Me</button> -->

  <div id="gpsDisplay" style="margin-bottom: 0.5rem; font-size: 0.85rem; color: #333;">
    Current location: unknown
  </div>

  <div id="businessList"></div>

</div>


<!-- Load JS at the end, after all elements exist -->

<script src="script.js"></script>




</body>
</html>
